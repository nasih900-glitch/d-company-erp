name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U erp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r backend/requirements.txt
      - run: pip install ruff mypy pytest pytest-asyncio pytest-cov
      - name: Lint advisory
        continue-on-error: true
        run: cd backend && ruff check . && ruff format --check .
      - name: Type-check advisory
        continue-on-error: true
        run: cd backend && mypy app
      - name: Migrations apply cleanly
        env:
          DATABASE_URL: postgresql+psycopg://erp:erp@localhost:5432/erp_test
        run: cd backend && alembic upgrade head
      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://erp:erp@localhost:5432/erp_test
        run: cd backend && pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm install --no-audit --no-fund
      - run: cd frontend && npm run lint || true
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm run test
      - run: cd frontend && npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -f infra/docker/backend.Dockerfile -t erp-backend:ci .
      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile -t erp-frontend:ci .

# D Company ERP — local dev / single-host deployment.
# For cloud, swap postgres/redis/minio for managed services and keep the app containers.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: erp
      MINIO_ROOT_PASSWORD: erp_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://erp:erp@postgres:5432/erp
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: erp
      S3_SECRET_KEY: erp_change_me
      JWT_SECRET: change_this_in_prod_change_this_in_prod
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-local-dev-only-password}
      ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  miniodata:

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Service workers must be revalidated so offline-cache updates roll out fast.
  location = /service-worker.js {
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Do not let source, internal docs, or secret-looking probes become SPA pages.
  location ~* ^/(?:\.env.*|\.git.*|\.hg.*|\.svn.*|\.ssh.*|\.DS_Store|docker-compose.*|Dockerfile.*|Caddyfile.*|id_rsa.*|id_dsa.*|.*\.(?:key|pem)|(?:AGENTS|HANDOFF|PROJECT_STATE|README|COMPANY_COMPLIANCE_CHECKLIST)\.md|(?:LEGAL_DOCUMENTS_CHECKLIST|D_Company_Legal_Documents_Checklist).*|(?:docs|backend|frontend|infra|scripts|tests)(?:/.*)?|package.*\.json|vite\.config\..*|tsconfig.*\.json|pyproject\.toml|requirements.*\.txt|alembic\.ini|pytest\.ini|Makefile)$ {
    return 404;
  }

  # Cache static assets aggressively, but never cache index.html.
  location ~* \.(?:js|css|woff2?|png|svg|jpg|jpeg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback.
  location / {
    try_files $uri /index.html;
  }

  # Reverse-proxy /api/* to the backend container in compose.
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Hide nginx version
  server_tokens off;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Service workers must be revalidated so offline-cache updates roll out fast.
  location = /service-worker.js {
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Cache static assets aggressively, but never cache index.html.
  location ~* \.(?:js|css|woff2?|png|svg|jpg|jpeg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback.
  location / {
    try_files $uri /index.html;
  }

  # Reverse-proxy /api/* to the backend container in compose.
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Hide nginx version
  server_tokens off;
}
